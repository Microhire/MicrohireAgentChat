# -----------------------------------------------------------------------------
# Publish Windows (Playwright Chromium) — production zip for Azure App Service (win-x64)
#
# Prerequisites:
#   - Repository on GitHub with Actions enabled (Settings → Actions → General).
#   - This file on your default branch.
#
# How to run:
#   Actions → "Publish Windows (Playwright Chromium)" → Run workflow.
#
# Output:
#   Artifact name: site-win64-playwright  (contains site.zip)
#
# Deploy (manual from laptop):
#   Unzip or use site.zip directly, e.g. from repo root:
#     az webapp deploy --resource-group <rg> --name <app> --src-path site.zip --type zip --async true
#
# Deploy (optional from this workflow):
#   1) One-time Azure CLI (run as a user who can create app registrations / assign roles):
#        SUB=$(az account show --query id -o tsv)
#        az ad sp create-for-rbac --name "github-MicrohireAgentChat-deploy" --role contributor \
#          --scopes /subscriptions/$SUB/resourceGroups/rg-JennyJunkeer-9509 --json-auth
#      Copy the JSON output into GitHub: Settings → Secrets and variables → Actions → New repository secret
#      Name: AZURE_CREDENTIALS   Value: <paste entire JSON>
#   2) Run workflow with "Deploy to Azure after build" checked.
#   Edit AZURE_RG / AZURE_WEBAPP_NAME below if your App Service names differ.
#
# Trigger: manual only (workflow_dispatch). Add push: branches: [main] under on: if you want every merge to build.
# -----------------------------------------------------------------------------

name: Publish Windows (Playwright Chromium)

on:
  workflow_dispatch:
    inputs:
      deploy_to_azure:
        description: "After build, deploy site.zip to Azure App Service (requires AZURE_CREDENTIALS secret)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      AZURE_RG: rg-JennyJunkeer-9509
      AZURE_WEBAPP_NAME: microhire
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: dotnet publish
        run: dotnet publish MicrohireAgentChat/MicrohireAgentChat.csproj -c Release -o publish_out -r win-x64 --self-contained false

      - name: Install Chromium into publish (pw-browsers)
        shell: pwsh
        run: |
          $publish = Join-Path $env:GITHUB_WORKSPACE "publish_out"
          $browserDir = Join-Path $publish "pw-browsers"
          New-Item -ItemType Directory -Force -Path $browserDir | Out-Null
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserDir
          Set-Location $publish
          if (-not (Test-Path ".\playwright.ps1")) { throw "playwright.ps1 missing from publish output" }
          ./playwright.ps1 install chromium

      - name: Verify bundle
        shell: pwsh
        run: |
          ./Scripts/azure-build-vm/Verify-PlaywrightBundle.ps1 -PublishRoot publish_out

      # Compress-Archive with publish_out\* omits dot-prefixed folders (.playwright); ZipFile includes the full tree.
      - name: Zip site package
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          if (Test-Path "site.zip") { Remove-Item "site.zip" -Force }
          [System.IO.Compression.ZipFile]::CreateFromDirectory("publish_out", "site.zip")
          $z = [System.IO.Compression.ZipFile]::OpenRead("site.zip")
          try {
            $ok = $false
            foreach ($e in $z.Entries) { if ($e.FullName -match '(?i)^\.playwright[/\\]') { $ok = $true; Write-Host "zip: $($e.FullName)"; break } }
            if (-not $ok) { throw "site.zip missing .playwright/ — packaging broken" }
          } finally { $z.Dispose() }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: site-win64-playwright
          path: site.zip

      - name: Azure login
        if: ${{ inputs.deploy_to_azure }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service (OneDeploy zip)
        if: ${{ inputs.deploy_to_azure }}
        shell: pwsh
        run: |
          az webapp deploy --resource-group $env:AZURE_RG --name $env:AZURE_WEBAPP_NAME --src-path site.zip --type zip --async true
