# -----------------------------------------------------------------------------
# Publish win-x64 zip for Azure App Service (no Playwright / PDF).
#
# Output artifact: site-win64-azure (contains site.zip)
#
# Deploy: az webapp deploy --resource-group <rg> --name <app> --src-path site.zip --type zip --async true
# -----------------------------------------------------------------------------

name: Publish Windows (Azure App Service)

on:
  workflow_dispatch:
    inputs:
      deploy_to_azure:
        description: "After build, deploy site.zip to Azure App Service (requires AZURE_CREDENTIALS secret)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      AZURE_RG: rg-JennyJunkeer-9509
      AZURE_WEBAPP_NAME: microhire
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: dotnet publish
        run: dotnet publish MicrohireAgentChat/MicrohireAgentChat.csproj -c Release -o publish_out -r win-x64 --self-contained false

      - name: Zip site package
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          if (Test-Path "site.zip") { Remove-Item "site.zip" -Force }
          [System.IO.Compression.ZipFile]::CreateFromDirectory("publish_out", "site.zip")

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: site-win64-azure
          path: site.zip

      - name: Azure login
        if: ${{ inputs.deploy_to_azure }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service (OneDeploy zip)
        if: ${{ inputs.deploy_to_azure }}
        shell: pwsh
        run: |
          az webapp deploy --resource-group $env:AZURE_RG --name $env:AZURE_WEBAPP_NAME --src-path site.zip --type zip --async true
